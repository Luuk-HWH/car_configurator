<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>3D Car Display - Realistische Studio</title>
    <style>
        body { margin: 0; background: white; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; }
        #loader { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 20px; color: #666; font-weight: bold; }
    </style>
</head>
<body>

<div id="loader">Jouw eigen sportwagen wordt ingeladen...</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>

<script>
    let scene, camera, renderer, autoModel, lakMateriaal;
    let isUserInteracting = false;
    let autoRotateTimeout;
    let allesOpen = false;

    // Lijst om bewegende onderdelen uit jouw specifieke model in op te slaan
    let deurenEnKleppen = [];

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff); 
        
        camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 2.5, 7);
        camera.lookAt(0, 0.4, 0);

        renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.4; // Prachtige heldere showroom belichting
        document.body.appendChild(renderer.domElement);

        // --- HOOGWAARDIGE STUDIO BELICHTING ---
        scene.add(new THREE.AmbientLight(0xffffff, 0.7)); 

        const topLight = new THREE.DirectionalLight(0xffffff, 1.3);
        topLight.position.set(0, 15, 0);
        topLight.castShadow = true;
        topLight.shadow.mapSize.width = 2048;
        topLight.shadow.mapSize.height = 2048;
        topLight.shadow.bias = -0.0001;
        scene.add(topLight);

        const spotVoor = new THREE.DirectionalLight(0xffffff, 1.0);
        spotVoor.position.set(6, 4, 5);
        scene.add(spotVoor);

        const spotAchter = new THREE.DirectionalLight(0xffffff, 0.7);
        spotAchter.position.set(-6, 3, -5);
        scene.add(spotAchter);

        // Studio reflectievloer met zachte schaduw
        const vloerGeo = new THREE.PlaneGeometry(100, 100);
        const vloerMat = new THREE.ShadowMaterial({ opacity: 0.15 });
        const vloer = new THREE.Mesh(vloerGeo, vloerMat);
        vloer.rotation.x = -Math.PI / 2;
        vloer.receiveShadow = true;
        scene.add(vloer);

        // Premium glanzende metallic autolak
        lakMateriaal = new THREE.MeshStandardMaterial({
            color: 0x0044ff,
            metalness: 0.92,
            roughness: 0.06,
            clearcoat: 1.0,
            clearcoatRoughness: 0.02
        });

        // --- HIER LAAD IK JOUW EIGEN MODEL IN ---
        const loader = new THREE.GLTFLoader();
        
        loader.load('mijnauto.glb', function (gltf) {
            autoModel = gltf.scene;

            autoModel.traverse(function (node) {
                if (node.isMesh) {
                    node.castShadow = true;
                    node.receiveShadow = true;
                    
                    // Herken automatisch de lak-onderdelen op basis van veelvoorkomende namen
                    const matName = node.material.name ? node.material.name.toLowerCase() : '';
                    if (matName.includes('body') || matName.includes('paint') || matName.includes('carrosserie') || matName.includes('lak') || matName.includes('exterior')) {
                        node.material = lakMateriaal;
                    }

                    // Zorg dat glazen ruiten mooi spiegelen en doorschijnen
                    if (matName.includes('window') || matName.includes('glass') || matName.includes('glas')) {
                        node.material.roughness = 0.0;
                        node.material.metalness = 1.0;
                    }
                }

                // Sla de bewegende onderdelen op als ze zo genoemd zijn in het Sketchfab model
                const nodeName = node.name.toLowerCase();
                if (nodeName.includes('door') || nodeName.includes('hood') || nodeName.includes('trunk') || nodeName.includes('boot') || nodeName.includes('klep')) {
                    deurenEnKleppen.push(node);
                }
            });

            // AUTOMATISCHE SCHAAL EN CENTRERING (Zorgt dat de auto altijd perfect in de studio past!)
            const box = new THREE.Box3().setFromObject(autoModel);
            const size = box.getSize(new THREE.Vector3());
            const center = box.getCenter(new THREE.Vector3());
            
            // Bereken hoe groot de auto is en schaal hem naar een mooi studioformaat
            const maxDim = Math.max(size.x, size.y, size.z);
            const targetScale = 3.0 / maxDim;
            autoModel.scale.set(targetScale, targetScale, targetScale);
            
            // Zet de auto exact in het middelpunt op de vloer
            autoModel.position.x = -center.x * targetScale;
            autoModel.position.z = -center.z * targetScale;
            autoModel.position.y = -box.min.y * targetScale;

            scene.add(autoModel);
            document.getElementById('loader').style.display = 'none';
            animate();
        }, undefined, function(error) {
            document.getElementById('loader').innerText = "Fout bij laden van mijnauto.glb. Controleer de bestandsnaam!";
            console.error(error);
        });
    }

    function animate() {
        requestAnimationFrame(animate);

        // Rustig ronddraaien in de showroom als de gebruiker niks doet
        if (autoModel && !isUserInteracting) {
            autoModel.rotation.y += 0.002;
        }

        renderer.render(scene, camera);
    }

    // --- COMMUNICATIE VANUIT TOUCHSCREEN ---
    window.addEventListener('message', (event) => {
        const boodschap = event.data;
        if (!autoModel) return;

        if (boodschap.type === 'start_sleep') {
            isUserInteracting = true;
            clearTimeout(autoRotateTimeout);
        }
        
        if (boodschap.type === 'stop_sleep') {
            autoRotateTimeout = setTimeout(() => { isUserInteracting = false; }, 4000); 
        }

        if (boodschap.type === 'kleur') {
            lakMateriaal.color.set(boodschap.waarde);
        }

        if (boodschap.type === 'draai') {
            autoModel.rotation.y += boodschap.waarde;
        }

        if (boodschap.type === 'zoom') {
            camera.position.multiplyScalar(boodschap.waarde);
            camera.lookAt(0, 0.4, 0);
        }

        if (boodschap.type === 'animatie' && boodschap.waarde === 'alles') {
            allesOpen = !allesOpen;
            
            // Open of sluit herkenbare deuren en kleppen in jouw gedownloade model
            deurenEnKleppen.forEach(node => {
                if (node.name.toLowerCase().includes('door_l') || node.name.toLowerCase().includes('left')) {
                    node.rotation.y = allesOpen ? 0.8 : 0;
                } else if (node.name.toLowerCase().includes('door_r') || node.name.toLowerCase().includes('right')) {
                    node.rotation.y = allesOpen ? -0.8 : 0;
                } else {
                    node.rotation.x = allesOpen ? -0.6 : 0;
                }
            });
        }
    });

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    init();
</script>
</body>
</html>
