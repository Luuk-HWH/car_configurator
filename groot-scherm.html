<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>3D Car Display - Realistische Studio</title>
    <style>
        body { margin: 0; background: white; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; }
        #loader { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 20px; color: #666; font-weight: bold; }
    </style>
</head>
<body>

<div id="loader">Jouw eigen sportwagen wordt ingeladen...</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>

<script>
    let scene, camera, renderer, autoModel, lakMateriaal;
    let isUserInteracting = false;
    let autoRotateTimeout;
    let allesOpen = false;

    // Lijsten om onderdelen in te bewaren voor animatie
    let lossePanelen = [];
    let rotatieDoelen = new Map();

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff); 
        
        camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 2.5, 7);
        camera.lookAt(0, 0.4, 0);

        renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.4; 
        document.body.appendChild(renderer.domElement);

        // --- HOOGWAARDIGE STUDIO BELICHTING ---
        scene.add(new THREE.AmbientLight(0xffffff, 0.7)); 

        const topLight = new THREE.DirectionalLight(0xffffff, 1.3);
        topLight.position.set(0, 15, 0);
        topLight.castShadow = true;
        topLight.shadow.mapSize.width = 2048;
        topLight.shadow.mapSize.height = 2048;
        topLight.shadow.bias = -0.0001;
        scene.add(topLight);

        const spotVoor = new THREE.DirectionalLight(0xffffff, 1.0);
        spotVoor.position.set(6, 4, 5);
        scene.add(spotVoor);

        const spotAchter = new THREE.DirectionalLight(0xffffff, 0.7);
        spotAchter.position.set(-6, 3, -5);
        scene.add(spotAchter);

        // Studio reflectievloer met zachte schaduw
        const vloerGeo = new THREE.PlaneGeometry(100, 100);
        const vloerMat = new THREE.ShadowMaterial({ opacity: 0.15 });
        const vloer = new THREE.Mesh(vloerGeo, vloerMat);
        vloer.rotation.x = -Math.PI / 2;
        vloer.receiveShadow = true;
        scene.add(vloer);

        // Premium glanzende metallic autolak
        lakMateriaal = new THREE.MeshStandardMaterial({
            color: 0x0044ff,
            metalness: 0.92,
            roughness: 0.06,
            clearcoat: 1.0,
            clearcoatRoughness: 0.02
        });

        // --- LAAD HET MODEL IN ---
        const loader = new THREE.GLTFLoader();
        
        loader.load('mijnauto.glb', function (gltf) {
            autoModel = gltf.scene;

            autoModel.traverse(function (node) {
                if (node.isMesh) {
                    node.castShadow = true;
                    node.receiveShadow = true;
                    
                    const matName = node.material.name ? node.material.name.toLowerCase() : '';
                    const nodeName = node.name ? node.name.toLowerCase() : '';

                    // Lak toewijzen
                    if (matName.includes('body') || matName.includes('paint') || matName.includes('carrosserie') || matName.includes('lak') || matName.includes('exterior')) {
                        node.material = lakMateriaal;
                    }

                    // Ramen glanzend maken
                    if (matName.includes('window') || matName.includes('glass') || matName.includes('glas')) {
                        node.material.roughness = 0.0;
                        node.material.metalness = 1.0;
                    }

                    // UNIVERSELE HERKENNING: Is dit een losse deur, klep of motorkap?
                    if (nodeName.includes('door') || nodeName.includes('hood') || nodeName.includes('trunk') || nodeName.includes('boot') || nodeName.includes('klep') || nodeName.includes('gate') || nodeName.includes('bonnet')) {
                        // Sla het bovenliggende scharnier-onderdeel op als dat kan, anders de mesh zelf
                        let breekPunt = node.parent && node.parent !== autoModel ? node.parent : node;
                        if (!lossePanelen.includes(breekPunt)) {
                            lossePanelen.push(breekPunt);
                            rotatieDoelen.set(breekPunt, 0); // Startpositie is dicht (0 graden)
                        }
                    }
                }
            });

            // AUTOMATISCHE SCHAAL EN CENTRERING
            const box = new THREE.Box3().setFromObject(autoModel);
            const size = box.getSize(new THREE.Vector3());
            const center = box.getCenter(new THREE.Vector3());
            
            const maxDim = Math.max(size.x, size.y, size.z);
            const targetScale = 3.0 / maxDim;
            autoModel.scale.set(targetScale, targetScale, targetScale);
            
            autoModel.position.x = -center.x * targetScale;
            autoModel.position.z = -center.z * targetScale;
            autoModel.position.y = -box.min.y * targetScale;

            scene.add(autoModel);
            document.getElementById('loader').style.display = 'none';
            animate();
        }, undefined, function(error) {
            document.getElementById('loader').innerText = "Fout bij laden van mijnauto.glb.";
            console.error(error);
        });
    }

    function animate() {
        requestAnimationFrame(animate);

        // Vloeiende animatie voor de deuren en kleppen
        lossePanelen.forEach(node => {
            let doelRotatie = rotatieDoelen.get(node) || 0;
            
            // Bepaal of het onderdeel naar links/rechts (Y-as) of omhoog (X-as) moet draaien
            if (node.name.toLowerCase().includes('door')) {
                // Linker- of rechterdeur check voor de juiste draairichting
                if (node.name.toLowerCase().includes('r') || node.position.z < 0) {
                    node.rotation.y += (-doelRotatie - node.rotation.y) * 0.08;
                } else {
                    node.rotation.y += (doelRotatie - node.rotation.y) * 0.08;
                }
            } else {
                // Motorkap of kofferbak (draait omhoog via X-as)
                if (node.name.toLowerCase().includes('hood') || node.name.toLowerCase().includes('bonnet')) {
                    node.rotation.x += (-doelRotatie - node.rotation.x) * 0.08;
                } else {
                    node.rotation.x += (doelRotatie - node.rotation.x) * 0.08;
                }
            }
        });

        // Rustig ronddraaien in de showroom
        if (autoModel && !isUserInteracting) {
            autoModel.rotation.y += 0.002;
        }

        renderer.render(scene, camera);
    }

    // --- COMMUNICATIE ---
    window.addEventListener('message', (event) => {
        const boodschap = event.data;
        if (!autoModel) return;

        if (boodschap.type === 'start_sleep') {
            isUserInteracting = true;
            clearTimeout(autoRotateTimeout);
        }
        
        if (boodschap.type === 'stop_sleep') {
            autoRotateTimeout = setTimeout(() => { isUserInteracting = false; }, 4000); 
        }

        if (boodschap.type === 'kleur') {
            lakMateriaal.color.set(boodschap.waarde);
        }

        if (boodschap.type === 'draai') {
            autoModel.rotation.y += boodschap.waarde;
        }

        if (boodschap.type === 'zoom') {
            camera.position.multiplyScalar(boodschap.waarde);
            camera.lookAt(0, 0.4, 0);
        }

        if (boodschap.type === 'animatie' && boodschap.waarde === 'alles') {
            allesOpen = !allesOpen;
            
            // Geef elk los paneel zijn nieuwe doel-rotatie (0.7 radialen is ongeveer 40 graden open)
            lossePanelen.forEach(node => {
                rotatieDoelen.set(node, allesOpen ? 0.7 : 0);
            });
        }
    });

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    init();
</script>
</body>
</html>
