<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>3D Car Display - Realistische Sportwagen Showroom</title>
    <style>
        body { margin: 0; background: white; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; }
    </style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    let scene, camera, renderer, autoGroep, lakMateriaal;
    let isUserInteracting = false;
    let autoRotateTimeout;
    let allesOpen = false;

    // Onderdelen voor animatie
    let deurLinks, deurRechts, motorkap, achterKlep;
    let doelen = { deuren: 0, motorkap: 0, achterKlep: 0 };

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff); 
        
        camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(6, 3, 8);
        camera.lookAt(0, 0.4, 0);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.3; 
        document.body.appendChild(renderer.domElement);

        // --- ULTRA FRISSE EN HELDERDE STUDIO BELICHTING ---
        scene.add(new THREE.AmbientLight(0xffffff, 0.8)); 

        // Grote softbox van boven
        const topLight = new THREE.DirectionalLight(0xffffff, 1.0);
        topLight.position.set(0, 15, 0);
        topLight.castShadow = true;
        topLight.shadow.mapSize.width = 2048;
        topLight.shadow.mapSize.height = 2048;
        topLight.shadow.bias = -0.0005;
        scene.add(topLight);

        // Studio spots rondom voor perfecte contouren en glans
        const spotVoor = new THREE.DirectionalLight(0xffffff, 0.9);
        spotVoor.position.set(8, 4, 4);
        scene.add(spotVoor);

        const spotAchter = new THREE.DirectionalLight(0xffffff, 0.7);
        spotAchter.position.set(-8, 3, -4);
        scene.add(spotAchter);

        const zijLicht = new THREE.DirectionalLight(0xffffff, 0.5);
        zijLicht.position.set(0, 4, -8);
        scene.add(zijLicht);

        // Zachte schaduwvloer
        const vloerGeo = new THREE.PlaneGeometry(100, 100);
        const vloerMat = new THREE.ShadowMaterial({ opacity: 0.15 });
        const vloer = new THREE.Mesh(vloerGeo, vloerMat);
        vloer.rotation.x = -Math.PI / 2;
        vloer.receiveShadow = true;
        scene.add(vloer);

        // --- REALISTISCHE METALLIC PREMIUM LAK ---
        lakMateriaal = new THREE.MeshStandardMaterial({ 
            color: 0x0044ff, 
            roughness: 0.05, 
            metalness: 0.95,
            clearcoat: 1.0, 
            clearcoatRoughness: 0.02
        });

        const carbonMat = new THREE.MeshStandardMaterial({ color: 0x151515, roughness: 0.4, metalness: 0.2 });
        const glasMat = new THREE.MeshStandardMaterial({ color: 0x030303, roughness: 0.02, metalness: 0.95, transparent: true, opacity: 0.9 });
        const chroomVelgMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.02, metalness: 1.0 });
        const lampMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 1.2 });
        const achterLampMat = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xff0000, emissiveIntensity: 1.0 });

        autoGroep = new THREE.Group();

        // 1. GESTROOMLIJKDE SPORTWAGEN CARROSSERIE BOUWEN
        // Aerodynamische schuine neus/bumper
        const neusGeo = new THREE.CylinderGeometry(0.8, 1.0, 1.5, 4, 1, false, Math.PI, Math.PI);
        neusGeo.rotateZ(Math.PI / 2);
        neusGeo.scale(0.5, 1, 1.95);
        const neus = new THREE.Mesh(neusGeo, lakMateriaal);
        neus.position.set(1.65, 0.48, 0);
        neus.castShadow = true;
        autoGroep.add(neus);

        // Middenstuk chassis
        const basisGeo = new THREE.BoxGeometry(2.4, 0.45, 1.96);
        const basis = new THREE.Mesh(basisGeo, lakMateriaal);
        basis.position.set(0, 0.55, 0);
        basis.castShadow = true;
        autoGroep.add(basis);

        // Dikke sportieve achterkant
        const kontGeo = new THREE.BoxGeometry(1.2, 0.55, 1.96);
        const kont = new THREE.Mesh(kontGeo, lakMateriaal);
        kont.position.set(-1.4, 0.6, 0);
        kont.castShadow = true;
        autoGroep.add(kont);

        // 2. DIKKE CARBON ACHTERSPOILER
        const spoilerPootGeo = new THREE.BoxGeometry(0.1, 0.3, 1.4);
        const spoilerPoot = new THREE.Mesh(spoilerPootGeo, carbonMat);
        spoilerPoot.position.set(-1.8, 0.95, 0);
        const spoilerBladGeo = new THREE.BoxGeometry(0.3, 0.04, 1.9);
        const spoilerBlad = new THREE.Mesh(spoilerBladGeo, carbonMat);
        spoilerBlad.position.set(-1.8, 1.1, 0);
        spoilerBlad.rotation.z = -0.1;
        spoilerBlad.castShadow = true;
        autoGroep.add(spoilerPoot, spoilerBlad);

        // 3. SPORTIEVE COCKPIT & RUITEN (Aflopende daklijn)
        const raamMiddenGeo = new THREE.ConeGeometry(1.2, 0.6, 4);
        raamMiddenGeo.rotateY(Math.PI / 4);
        raamMiddenGeo.scale(1.8, 1, 1.5);
        const ramen = new THREE.Mesh(raamMiddenGeo, glasMat);
        ramen.position.set(-0.1, 1.05, 0);
        autoGroep.add(ramen);

        const dakPlaatGeo = new THREE.BoxGeometry(1.1, 0.02, 1.3);
        const dakPlaat = new THREE.Mesh(dakPlaatGeo, lakMateriaal);
        dakPlaat.position.set(-0.1, 1.35, 0);
        autoGroep.add(dakPlaat);

        // 4. DESIGN KOPLAMPEN EN ACHTERLICHTEN (Strakke LED strips)
        const ledStripGeo = new THREE.BoxGeometry(0.05, 0.08, 0.5);
        const koplampL = new THREE.Mesh(ledStripGeo, lampMat); koplampL.position.set(2.21, 0.55, 0.65); koplampL.rotation.y = -0.3; autoGroep.add(koplampL);
        const koplampR = new THREE.Mesh(ledStripGeo, lampMat); koplampR.position.set(2.21, 0.55, -0.65); koplampR.rotation.y = 0.3; autoGroep.add(koplampR);

        const ledAchterGeo = new THREE.BoxGeometry(0.05, 0.05, 1.8);
        const achterLamp = new THREE.Mesh(ledAchterGeo, achterLampMat); achterLamp.position.set(-2.01, 0.75, 0); autoGroep.add(achterLamp);

        // 5. INTERACTIEF: Vleugeldeuren (Zwaaien schuin omhoog en open!)
        const deurGeo = new THREE.BoxGeometry(1.1, 0.5, 0.04);
        
        deurLinks = new THREE.Group();
        deurLinks.position.set(0.6, 0.65, 0.98); 
        const deurLinksMesh = new THREE.Mesh(deurGeo, lakMateriaal);
        deurLinksMesh.position.set(-0.55, 0, 0);
        deurLinksMesh.castShadow = true;
        deurLinks.add(deurLinksMesh);
        autoGroep.add(deurLinks);

        deurRechts = new THREE.Group();
        deurRechts.position.set(0.6, 0.65, -0.98); 
        const deurRechtsMesh = new THREE.Mesh(deurGeo, lakMateriaal);
        deurRechtsMesh.position.set(-0.55, 0, 0);
        deurRechtsMesh.castShadow = true;
        deurRechts.add(deurRechtsMesh);
        autoGroep.add(deurRechts);

        // 6. INTERACTIEF: Grote Sportieve Motorkap
        motorkap = new THREE.Group();
        motorkap.position.set(0.6, 0.76, 0); 
        const motorkapMesh = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.03, 1.7), lakMateriaal);
        motorkapMesh.position.set(0.6, 0, 0);
        motorkapMesh.castShadow = true;
        motorkap.add(motorkapMesh);
        autoGroep.add(motorkap);

        // 7. INTERACTIEF: Kofferbak / Achterklep
        achterKlep = new THREE.Group();
        achterKlep.position.set(-0.8, 0.86, 0); 
        const achterKlepMesh = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.03, 1.6), lakMateriaal);
        achterKlepMesh.position.set(-0.45, 0, 0);
        achterKlepMesh.castShadow = true;
        achterKlep.add(achterKlepMesh);
        autoGroep.add(achterKlep);

        // 8. BREDE WIELKASTEN & DIKKE SPORTVELGEN
        const bandMat = new THREE.MeshStandardMaterial({ color: 0x121212, roughness: 0.8 });
        const wielGeo = new THREE.CylinderGeometry(0.38, 0.38, 0.3, 32); wielGeo.rotateX(Math.PI / 2);
        const velgGeo = new THREE.CylinderGeometry(0.28, 0.28, 0.31, 12); velgGeo.rotateX(Math.PI / 2);

        const wielPosities = [
            { x: -1.0, z: 0.98 }, { x: 1.2, z: 0.98 },
            { x: -1.0, z: -0.98 }, { x: 1.2, z: -0.98 }
        ];

        wielPosities.forEach(pos => {
            const wielSamen = new THREE.Group();
            wielSamen.position.set(pos.x, 0.38, pos.z);
            
            const band = new THREE.Mesh(wielGeo, bandMat);
            band.castShadow = true;
            const velg = new THREE.Mesh(velgGeo, chroomVelgMat);
            
            wielSamen.add(band, velg);
            autoGroep.add(wielSamen);
        });

        scene.add(autoGroep);
        animate();
    }

    function animate() {
        requestAnimationFrame(animate);

        // Vloeiende openingsanimaties
        deurLinks.rotation.y += (doelen.deuren - deurLinks.rotation.y) * 0.1;
        deurLinks.rotation.z += ((doelen.deuren * 0.3) - deurLinks.rotation.z) * 0.1; // Vleugeldeur effect omhoog!
        
        deurRechts.rotation.y += (-doelen.deuren - deurRechts.rotation.y) * 0.1;
        deurRechts.rotation.z += ((-doelen.deuren * 0.3) - deurRechts.rotation.z) * 0.1;

        motorkap.rotation.z += (doelen.motorkap - motorkap.rotation.z) * 0.1;
        achterKlep.rotation.z += (doelen.achterKlep - achterKlep.rotation.z) * 0.1;

        // Rustig ronddraaien in de showroom
        if (autoGroep && !isUserInteracting) {
            autoGroep.rotation.y += 0.002;
        }

        renderer.render(scene, camera);
    }

    // --- TOUCHSCREEN PROTOCOL ---
    window.addEventListener('message', (event) => {
        const boodschap = event.data;
        if (!autoGroep) return;

        if (boodschap.type === 'start_sleep') {
            isUserInteracting = true;
            clearTimeout(autoRotateTimeout);
        }
        
        if (boodschap.type === 'stop_sleep') {
            autoRotateTimeout = setTimeout(() => { isUserInteracting = false; }, 4000); 
        }

        if (boodschap.type === 'kleur') {
            lakMateriaal.color.set(boodschap.waarde);
        }

        if (boodschap.type === 'draai') {
            autoGroep.rotation.y += boodschap.waarde;
        }

        if (boodschap.type === 'zoom') {
            camera.position.multiplyScalar(boodschap.waarde);
            camera.lookAt(0, 0.4, 0);
        }

        if (boodschap.type === 'animatie' && boodschap.waarde === 'alles') {
            allesOpen = !allesOpen;
            doelen.deuren = allesOpen ? 1.0 : 0;      
            doelen.motorkap = allesOpen ? -1.2 : 0;   // Wijd open omhoog
            doelen.achterKlep = allesOpen ? 1.2 : 0;  // Wijd open omhoog
        }
    });

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    init();
</script>
</body>
</html>
