<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Car Configurator Controller</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: #f4f4f4; padding: 20px; }
        h1 { margin-bottom: 30px; }
        #car-selector { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; }
        .arrow { font-size: 30px; cursor: pointer; padding: 10px; background: #ddd; border-radius: 5px; }
        #color-picker { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
        .color-dot { 
            width: 70px; height: 70px; border-radius: 50%; 
            cursor: pointer; border: 4px solid transparent; 
            transition: transform 0.2s, border-color 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .color-dot:hover { transform: scale(1.1); }
        .color-dot.selected { border-color: #333; outline: 3px solid white; }
        #open-btn { padding: 20px 40px; font-size: 18px; cursor: pointer; background: #333; color: white; border: none; border-radius: 10px; transition: background 0.2s; margin-bottom: 20px; }
        #plate-section { display: flex; gap: 10px; margin-top: 20px; }
        #plate-input { padding: 15px; font-size: 16px; border-radius: 10px; border: 1px solid #ccc; width: 150px; }
        #plate-btn { padding: 15px 25px; font-size: 16px; cursor: pointer; background: #333; color: white; border: none; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="car-selector">
        <div class="arrow" id="prev-car">&lt;</div>
        <h2 id="car-name">Ford Mustang</h2>
        <div class="arrow" id="next-car">&gt;</div>
    </div>

    <h1>Kies een kleur</h1>
    <div id="color-picker">
        <div class="color-dot" style="background: #6E2E2E;" data-color="#6E2E2E"></div>
        <div class="color-dot" style="background: #4E5336;" data-color="#4E5336"></div>
        <div class="color-dot" style="background: #3E3E41;" data-color="#3E3E41"></div>
        <div class="color-dot" style="background: #D9C375;" data-color="#D9C375"></div>
        <div class="color-dot" style="background: #E69931;" data-color="#E69931"></div>
        <div class="color-dot" style="background: #5F6E50;" data-color="#5F6E50"></div>
    </div>

    <button id="open-btn">Open/Sluit deuren en kappen</button>

    <div id="plate-section">
        <input type="text" id="plate-input" placeholder="Kenteken..." maxlength="8">
        <button id="plate-btn">Pas kenteken aan</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCanbhxTJjMLhy4iZLhklCxyFCHKGF4ZAw",
            authDomain: "car-configurator-616c9.firebaseapp.com",
            databaseURL: "https://car-configurator-616c9-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "car-configurator-616c9",
            storageBucket: "car-configurator-616c9.firebasestorage.app",
            messagingSenderId: "1065746669569",
            appId: "1:1065746669569:web:fbd1fbc36839f4a091e000"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Car Selector logica
        const cars = [
            { file: './mijnauto.glb', name: 'Ford Mustang' },
            { file: './bugatti_veyron_fully_rigged..glb', name: 'Bugatti Veyron' }
        ];
        let currentIndex = 0;
        const carNameEl = document.getElementById('car-name');

        document.getElementById('prev-car').addEventListener('click', () => {
            currentIndex = (currentIndex === 0) ? cars.length - 1 : currentIndex - 1;
            updateCar();
        });

        document.getElementById('next-car').addEventListener('click', () => {
            currentIndex = (currentIndex === cars.length - 1) ? 0 : currentIndex + 1;
            updateCar();
        });

        function updateCar() {
            set(ref(db, 'auto/model'), cars[currentIndex].file);
            carNameEl.innerText = cars[currentIndex].name;
        }

        // Kleuren logica
        const dots = document.querySelectorAll('.color-dot');
        dots.forEach(dot => {
            dot.addEventListener('click', () => {
                set(ref(db, 'auto/kleur'), dot.getAttribute('data-color'));
            });
        });

        onValue(ref(db, 'auto/kleur'), (snapshot) => {
            const activeColor = snapshot.val();
            dots.forEach(dot => {
                dot.classList.toggle('selected', dot.getAttribute('data-color') === activeColor);
            });
        });

        // Deuren logica
        const openBtn = document.getElementById('open-btn');
        let isOpened = false;
        openBtn.addEventListener('click', () => {
            isOpened = !isOpened;
            set(ref(db, 'auto/deuren'), isOpened);
        });

        // Kenteken logica
        const plateBtn = document.getElementById('plate-btn');
        const plateInput = document.getElementById('plate-input');
        plateBtn.addEventListener('click', () => {
            set(ref(db, 'auto/kenteken'), plateInput.value.toUpperCase());
        });
    </script>
</body>
</html>
