<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Car Configurator Controller</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        button { padding: 20px 40px; font-size: 20px; margin: 10px; cursor: pointer; border-radius: 10px; border: none; color: white; }
    </style>
</head>
<body>

    <h1>Kies een kleur</h1>
    <button style="background: red;" onclick="stuurKleur('#ff0000')">Rood</button>
    <button style="background: green;" onclick="stuurKleur('#00ff00')">Groen</button>
    <button style="background: blue;" onclick="stuurKleur('#0000ff')">Blauw</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCanbhxTJjMLhy4iZLhklCxyFCHKGF4ZAw",
            authDomain: "car-configurator-616c9.firebaseapp.com",
            databaseURL: "https://car-configurator-616c9-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "car-configurator-616c9",
            storageBucket: "car-configurator-616c9.firebasestorage.app",
            messagingSenderId: "1065746669569",
            appId: "1:1065746669569:web:fbd1fbc36839f4a091e000"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Maak de functie globaal zodat de knoppen hem kunnen aanroepen
        window.stuurKleur = function(kleur) {
            set(ref(db, 'auto/kleur'), kleur);
            console.log("Kleur verzonden:", kleur);
        };
    </script>
</body>
</html>
