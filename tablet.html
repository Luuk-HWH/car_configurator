<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Car Configurator Controller</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #f4f4f4; }
        h1 { margin-bottom: 30px; }
        #color-picker { display: flex; gap: 20px; margin-bottom: 40px; }
        .color-dot { 
            width: 70px; height: 70px; border-radius: 50%; 
            cursor: pointer; border: 4px solid transparent; 
            transition: transform 0.2s, border-color 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .color-dot:hover { transform: scale(1.1); }
        .color-dot.selected { border-color: #333; outline: 3px solid white; }
        #open-btn { padding: 20px 40px; font-size: 18px; cursor: pointer; background: #333; color: white; border: none; border-radius: 10px; transition: background 0.2s; }
        #open-btn:active { background: #555; }
    </style>
</head>
<body>

    <h1>Kies een kleur</h1>
    <div id="color-picker">
        <div class="color-dot" style="background: #ff0000;" data-color="#ff0000"></div>
        <div class="color-dot" style="background: #00ff00;" data-color="#00ff00"></div>
        <div class="color-dot" style="background: #0000ff;" data-color="#0000ff"></div>
        <div class="color-dot" style="background: #ffffff;" data-color="#ffffff"></div>
        <div class="color-dot" style="background: #333333;" data-color="#333333"></div>
    </div>

    <button id="open-btn">Open/Sluit deuren en kappen</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCanbhxTJjMLhy4iZLhklCxyFCHKGF4ZAw",
            authDomain: "car-configurator-616c9.firebaseapp.com",
            databaseURL: "https://car-configurator-616c9-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "car-configurator-616c9",
            storageBucket: "car-configurator-616c9.firebasestorage.app",
            messagingSenderId: "1065746669569",
            appId: "1:1065746669569:web:fbd1fbc36839f4a091e000"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Kleuren logica
        const dots = document.querySelectorAll('.color-dot');
        dots.forEach(dot => {
            dot.addEventListener('click', () => {
                set(ref(db, 'auto/kleur'), dot.getAttribute('data-color'));
            });
        });

        onValue(ref(db, 'auto/kleur'), (snapshot) => {
            const activeColor = snapshot.val();
            dots.forEach(dot => {
                dot.classList.toggle('selected', dot.getAttribute('data-color') === activeColor);
            });
        });

        // Deuren logica
        const openBtn = document.getElementById('open-btn');
        let isOpened = false;
        openBtn.addEventListener('click', () => {
            isOpened = !isOpened;
            set(ref(db, 'auto/deuren'), isOpened);
        });
    </script>
</body>
</html>
