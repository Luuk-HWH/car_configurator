<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Car Configurator Controller</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: #e0e0e0; padding: 20px; }
        .view { display: none; width: 100%; max-width: 800px; text-align: center; background: white; border-radius: 20px; padding: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .active { display: block; }
        .header-bar { display: flex; justify-content: space-between; margin-bottom: 20px; }
        #car-selector { display: flex; align-items: center; justify-content: center; gap: 40px; margin-bottom: 30px; }
        .arrow { font-size: 50px; cursor: pointer; padding: 20px; background: #f4f4f4; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        #select-btn, .action-btn {
            padding: 20px 40px;
            font-size: 20px;
            cursor: pointer;
            background: #333;
            color: white;
            border: none;
            border-radius: 10px;
        }

        .icon-btn {
            width: 58px;
            height: 58px;
            padding: 0;
            cursor: pointer;
            background: #f4f4f4;
            color: #111;
            border: none;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .button-icon,
        .fullscreen-icon {
            width: 31px;
            height: 31px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2.4;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .icon-compress { display: none; }
        .is-fullscreen .icon-expand { display: none; }
        .is-fullscreen .icon-compress { display: block; }

        #sub-menu { min-height: 200px; display: flex; justify-content: center; align-items: center; flex-wrap: wrap; gap: 15px; margin: 20px 0; border: 2px dashed #ccc; border-radius: 10px; }
        .bottom-nav { display: flex; justify-content: center; gap: 24px; padding-top: 20px; border-top: 2px solid #eee; }
        .nav-icon { font-size: 22px; cursor: pointer; transition: transform 0.2s; padding: 14px 22px; background: #f4f4f4; border-radius: 10px; font-weight: bold; }
        .nav-icon:hover { transform: scale(1.08); }
        .color-dot { width: 70px; height: 70px; border-radius: 50%; cursor: pointer; border: 4px solid transparent; transition: transform 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #touch-pad { width: 100%; height: 200px; background: #f0f0f0; border-radius: 10px; display: flex; align-items: center; justify-content: center; touch-action: none; border: 2px solid #333; font-weight: bold; }
    </style>
</head>
<body>

    <div id="view-selector" class="view active">
        <h1>Choose your car</h1>
        <div id="car-selector">
            <div class="arrow" id="prev-car">&lt;</div>
            <h2 id="car-name">Ford Mustang</h2>
            <div class="arrow" id="next-car">&gt;</div>
        </div>
        <button id="select-btn">Select</button>
    </div>

    <div id="view-customizer" class="view">
        <div class="header-bar">
            <button id="back-btn" class="icon-btn" type="button" aria-label="Back" title="Back">
                <svg class="button-icon" viewBox="0 0 24 24">
                    <path d="M15 6l-6 6 6 6" />
                </svg>
            </button>

            <button id="fullscreen-btn" class="icon-btn" type="button" aria-label="Enter fullscreen" title="Fullscreen">
                <svg class="fullscreen-icon icon-expand" viewBox="0 0 24 24">
                    <path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5" />
                </svg>
                <svg class="fullscreen-icon icon-compress" viewBox="0 0 24 24">
                    <path d="M9 4v5H4M15 4v5h5M9 20v-5H4M15 20v-5h5" />
                </svg>
            </button>
        </div>

        <h1>Configurator</h1>
        <div id="sub-menu"><p>Choose an option below</p></div>

        <div class="bottom-nav">
            <div class="nav-icon" id="btn-color">Color</div>
            <div class="nav-icon" id="btn-doors">Doors</div>
            <div class="nav-icon" id="btn-touch">Rotate</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCanbhxTJjMLhy4iZLhklCxyFCHKGF4ZAw",
            authDomain: "car-configurator-616c9.firebaseapp.com",
            databaseURL: "https://car-configurator-616c9-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "car-configurator-616c9",
            storageBucket: "car-configurator-616c9.firebasestorage.app",
            messagingSenderId: "1065746669569",
            appId: "1:1065746669569:web:fbd1fbc36839f4a091e000"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const cars = [
            { name: 'Ford Mustang', file: './mijnauto.glb' },
            { name: 'Bugatti Veyron', file: './bugatti_veyron_fully_rigged..glb' }
        ];

        let selectedCarIndex = 0;

        function updateCarSelector() {
            const selectedCar = cars[selectedCarIndex];
            document.getElementById('car-name').innerText = selectedCar.name;
            set(ref(db, 'auto/model'), selectedCar.file);
        }

        document.getElementById('prev-car').addEventListener('click', () => {
            selectedCarIndex--;
            if (selectedCarIndex < 0) selectedCarIndex = cars.length - 1;
            updateCarSelector();
        });

        document.getElementById('next-car').addEventListener('click', () => {
            selectedCarIndex++;
            if (selectedCarIndex >= cars.length) selectedCarIndex = 0;
            updateCarSelector();
        });

        document.getElementById('select-btn').addEventListener('click', () => {
            document.getElementById('view-selector').classList.remove('active');
            document.getElementById('view-customizer').classList.add('active');
        });

        document.getElementById('back-btn').addEventListener('click', () => {
            document.getElementById('view-customizer').classList.remove('active');
            document.getElementById('view-selector').classList.add('active');
        });

        const fullscreenBtn = document.getElementById('fullscreen-btn');

        function updateFullscreenButton() {
            const isFullscreen = !!document.fullscreenElement;
            document.documentElement.classList.toggle('is-fullscreen', isFullscreen);
            fullscreenBtn.setAttribute('aria-label', isFullscreen ? 'Exit fullscreen' : 'Enter fullscreen');
            fullscreenBtn.setAttribute('title', isFullscreen ? 'Exit fullscreen' : 'Fullscreen');
        }

        fullscreenBtn.addEventListener('click', async () => {
            if (!document.fullscreenElement) {
                await document.documentElement.requestFullscreen();
            } else {
                await document.exitFullscreen();
            }

            updateFullscreenButton();
        });

        document.addEventListener('fullscreenchange', updateFullscreenButton);
        updateFullscreenButton();

        document.getElementById('btn-touch').addEventListener('click', () => {
            const subMenu = document.getElementById('sub-menu');
            subMenu.innerHTML = '<h3>Drag horizontally to rotate</h3><div id="touch-pad">DRAG HERE</div>';

            let lastX = 0;
            const pad = document.getElementById('touch-pad');

            pad.addEventListener('touchstart', (e) => {
                lastX = e.touches[0].clientX;
            }, { passive: true });

            pad.addEventListener('touchmove', (e) => {
                const currentX = e.touches[0].clientX;
                const delta = (currentX - lastX) * 0.05;
                set(ref(db, 'auto/rotatie_input'), delta);
                lastX = currentX;
            }, { passive: true });
        });

        document.getElementById('btn-color').addEventListener('click', () => {
            const subMenu = document.getElementById('sub-menu');
            subMenu.innerHTML = '';

            ['#7B2E2E', '#4B5134', '#3D3D40', '#DCC876', '#ED9C28', '#5D704F'].forEach(c => {
                const dot = document.createElement('div');
                dot.className = 'color-dot';
                dot.style.background = c;
                dot.addEventListener('click', () => set(ref(db, 'auto/kleur'), c));
                subMenu.appendChild(dot);
            });
        });

        document.getElementById('btn-doors').addEventListener('click', () => {
            const subMenu = document.getElementById('sub-menu');
            subMenu.innerHTML = '';

            const doorControls = [
                { label: 'Left door', part: 'Door_L' },
                { label: 'Right door', part: 'Door_R' },
                { label: 'Hood', part: 'Hood_front' },
                { label: 'Trunk', part: 'Hood_Back' }
            ];

            doorControls.forEach(control => {
                const btn = document.createElement('button');
                btn.className = 'action-btn';
                btn.innerText = control.label;

                let open = false;

                btn.addEventListener('click', () => {
                    open = !open;
                    set(ref(db, 'auto/deuren/' + control.part), open ? 1 : 0);
                });

                subMenu.appendChild(btn);
            });
        });

        updateCarSelector();
    </script>
</body>
</html>
