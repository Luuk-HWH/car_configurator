<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>3D Car Configurator</title>
    <style>
        body { margin: 0; background: #ffffff; overflow: hidden; }
        #loader { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #ffffff; display: flex; align-items: center; justify-content: center; z-index: 1000; transition: opacity 1s ease; }
        .tire-container { position: relative; width: 150px; height: 150px; }
        .tire { width: 150px; height: 150px; background: radial-gradient(circle, #ddd 20%, #333 25%, #333 70%, #000 75%); border-radius: 50%; border: 10px solid #222; animation: rotate 2s linear infinite, rollOut 1.5s ease-in 4s forwards; }
        .tire::after { content: ''; position: absolute; top: 10%; left: 10%; width: 80%; height: 80%; background: linear-gradient(90deg, transparent 44%, #fff 50%, transparent 56%), linear-gradient(18deg, transparent 44%, #fff 50%, transparent 56%), linear-gradient(54deg, transparent 44%, #fff 50%, transparent 56%), linear-gradient(90deg, transparent 44%, #fff 50%, transparent 56%), linear-gradient(126deg, transparent 44%, #fff 50%, transparent 56%), linear-gradient(162deg, transparent 44%, #fff 50%, transparent 56%); border-radius: 50%; }
        .smoke { position: absolute; bottom: -20px; left: -50px; width: 100px; height: 30px; background: #ccc; border-radius: 50%; opacity: 0; animation: fadeSmoke 1s linear 4s forwards; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes rollOut { to { transform: translateX(300vw) rotate(720deg); } }
        @keyframes fadeSmoke { 0% { opacity: 0.5; } 100% { opacity: 0; transform: translateX(100px); } }
        canvas { display: block; width: 100vw; height: 100vh; transition: opacity 1s ease; }
    </style>
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";
        const firebaseConfig = {
            apiKey: "AIzaSyCanbhxTJjMLhy4iZLhklCxyFCHKGF4ZAw",
            authDomain: "car-configurator-616c9.firebaseapp.com",
            databaseURL: "https://car-configurator-616c9-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "car-configurator-616c9",
            storageBucket: "car-configurator-616c9.firebasestorage.app",
            messagingSenderId: "1065746669569",
            appId: "1:1065746669569:web:fbd1fbc36839f4a091e000"
        };
        const app = initializeApp(firebaseConfig);
        window.db = getDatabase(app);
        window.ref = ref;
        window.onValue = onValue;
        init();
    </script>
</head>
<body>

<div id="loader">
    <div class="tire-container">
        <div class="tire"></div>
        <div class="smoke"></div>
    </div>
</div>

<script>
    let scene, camera, renderer, autoModel;
    let rotationInput = 0, autoRotate = true, rotationTimeout;
    let targets = { Door_L: { axis: 'z', val: 0 }, Door_R: { axis: 'z', val: 0 }, Hood_front: { axis: 'x', val: 0 }, Hood_Back: { axis: 'x', val: 1 } };

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);
        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 3.5, 8);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        scene.add(new THREE.AmbientLight(0xffffff, 1.5));
        
        // 1. Model wisselen (HERSTELD)
        window.onValue(window.ref(window.db, 'auto/model'), (snapshot) => {
            const modelUrl = snapshot.val() || './mijnauto.glb';
            new THREE.GLTFLoader().load(modelUrl, (gltf) => {
                if(autoModel) scene.remove(autoModel);
                autoModel = gltf.scene;
                autoModel.scale.set(0.8, 0.8, 0.8);
                autoModel.position.set(0, 0.5, 0);
                scene.add(autoModel);
                
                // Loader verbergen
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => document.getElementById('loader').style.display = 'none', 1000);
            });
        });

        // 2. Kleur (Reageert op alle meshes voor maximale compatibiliteit)
        window.onValue(window.ref(window.db, 'auto/kleur'), (snapshot) => {
            const k = snapshot.val();
            if(autoModel && k) {
                autoModel.traverse(n => { if(n.isMesh) n.material.color.set(k); });
            }
        });

        // 3. Deuren
        ['Door_L', 'Door_R', 'Hood_front', 'Hood_Back'].forEach(part => {
            window.onValue(window.ref(window.db, 'auto/deuren/' + part), (s) => {
                const val = s.val();
                if(part === 'Door_L') targets.Door_L.val = val ? -0.8 : 0;
                if(part === 'Door_R') targets.Door_R.val = val ? 0.8 : 0;
                if(part === 'Hood_front') targets.Hood_front.val = val ? -0.8 : 0;
                if(part === 'Hood_Back') targets.Hood_Back.val = val ? -0.8 : 1;
            });
        });

        // 4. Rotatie
        window.onValue(window.ref(window.db, 'auto/rotatie_input'), (s) => {
            rotationInput = s.val();
            autoRotate = false;
            clearTimeout(rotationTimeout);
            rotationTimeout = setTimeout(() => { autoRotate = true; }, 2000);
        });

        animate();
    }

    function animate() {
        requestAnimationFrame(animate);
        if(autoModel) {
            if (autoRotate) autoModel.rotation.y += 0.003;
            else autoModel.rotation.y += rotationInput;
            
            autoModel.traverse(node => {
                if (targets[node.name]) {
                    let t = targets[node.name];
                    if (t.axis === 'z') node.rotation.z += (t.val - node.rotation.z) * 0.1;
                    if (t.axis === 'x') node.rotation.x += (t.val - node.rotation.x) * 0.1;
                }
            });
        }
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
