<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>3D Car Configurator</title>
    <style>
        body { margin: 0; background: #ffffff; overflow: hidden; }
        #loader { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #ffffff; display: flex; align-items: center; justify-content: center; z-index: 1000; transition: opacity 1s ease; }
        canvas { display: block; width: 100vw; height: 100vh; }
    </style>
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";
        const firebaseConfig = {
            apiKey: "AIzaSyCanbhxTJjMLhy4iZLhklCxyFCHKGF4ZAw",
            authDomain: "car-configurator-616c9.firebaseapp.com",
            databaseURL: "https://car-configurator-616c9-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "car-configurator-616c9",
            storageBucket: "car-configurator-616c9.firebasestorage.app",
            messagingSenderId: "1065746669569",
            appId: "1:1065746669569:web:fbd1fbc36839f4a091e000"
        };
        const app = initializeApp(firebaseConfig);
        window.db = getDatabase(app);
        window.ref = ref;
        window.onValue = onValue;
        init();
    </script>
</head>
<body>
<div id="loader">Laden...</div>
<script>
    let scene, camera, renderer, autoModel;
    let rotationInput = 0, autoRotate = true, rotationTimeout;
    let targets = { Door_L: { axis: 'z', val: 0 }, Door_R: { axis: 'z', val: 0 }, Hood_front: { axis: 'x', val: 0 }, Hood_Back: { axis: 'x', val: 1 } };

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);
        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 3.5, 8);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));

        // 1. Luister naar rotatie
        window.onValue(window.ref(window.db, 'auto/rotatie_input'), (snapshot) => {
            rotationInput = snapshot.val();
            autoRotate = false;
            clearTimeout(rotationTimeout);
            rotationTimeout = setTimeout(() => { autoRotate = true; }, 2000);
        });

        // 2. Luister naar kleur
        window.onValue(window.ref(window.db, 'auto/kleur'), (snapshot) => {
            const k = snapshot.val();
            if(k && autoModel) autoModel.traverse(n => { if(n.isMesh && n.material.name === "CarPrimaryColor") n.material.color.set(k); });
        });

        // 3. Luister naar deuren
        const parts = ['Door_L', 'Door_R', 'Hood_front', 'Hood_Back'];
        parts.forEach(part => {
            window.onValue(window.ref(window.db, 'auto/deuren/' + part), (snapshot) => {
                const isOpen = snapshot.val();
                if (part === 'Door_L') targets.Door_L.val = isOpen ? -0.8 : 0;
                if (part === 'Door_R') targets.Door_R.val = isOpen ? 0.8 : 0;
                if (part === 'Hood_front') targets.Hood_front.val = isOpen ? -0.8 : 0;
                if (part === 'Hood_Back') targets.Hood_Back.val = isOpen ? -0.8 : 1;
            });
        });

        // Model laden
        window.onValue(window.ref(window.db, 'auto/model'), (snapshot) => {
            new THREE.GLTFLoader().load(snapshot.val() || './mijnauto.glb', (gltf) => {
                if(autoModel) scene.remove(autoModel);
                autoModel = gltf.scene;
                scene.add(autoModel);
                document.getElementById('loader').style.display = 'none';
            });
        });
        animate();
    }

    function animate() {
        requestAnimationFrame(animate);
        if(autoModel) {
            if (autoRotate) autoModel.rotation.y += 0.003;
            else autoModel.rotation.y += rotationInput;
            
            // Animatie van deuren
            autoModel.traverse(node => {
                if (targets.hasOwnProperty(node.name)) {
                    let t = targets[node.name];
                    if (t.axis === 'z') node.rotation.z += (t.val - node.rotation.z) * 0.1;
                    if (t.axis === 'x') node.rotation.x += (t.val - node.rotation.x) * 0.1;
                }
            });
        }
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
