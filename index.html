<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>3D Car Configurator</title>
    <style>
        body { margin: 0; background: #ffffff; overflow: hidden; }
        #loader { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-family: sans-serif; font-size: 20px; }
    </style>
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCanbhxTJjMLhy4iZLhklCxyFCHKGF4ZAw",
            authDomain: "car-configurator-616c9.firebaseapp.com",
            databaseURL: "https://car-configurator-616c9-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "car-configurator-616c9",
            storageBucket: "car-configurator-616c9.firebasestorage.app",
            messagingSenderId: "1065746669569",
            appId: "1:1065746669569:web:fbd1fbc36839f4a091e000"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Geef door aan de globale scope
        window.db = db;
        window.ref = ref;
        window.onValue = onValue;
    </script>
</head>
<body>

<div id="loader">Laden...</div>

<script>
    let scene, camera, renderer, autoModel, lakMateriaal;

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);
        
        camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1, 5);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.2));

        const loader = new THREE.GLTFLoader();
        loader.load('./mijnauto.glb', (gltf) => {
            autoModel = gltf.scene;
            scene.add(autoModel);
            
            // Zoek materiaal (voorbeeld)
            autoModel.traverse(node => { if(node.isMesh) lakMateriaal = node.material; });
            
            document.getElementById('loader').style.display = 'none';

            // Firebase koppeling
            if(window.db) {
                window.onValue(window.ref(window.db, 'auto/kleur'), (snapshot) => {
                    if(snapshot.val() && lakMateriaal) lakMateriaal.color.set(snapshot.val());
                });
            }
            animate();
        });
    }

    function animate() {
        requestAnimationFrame(animate);
        if(autoModel) autoModel.rotation.y += 0.005;
        renderer.render(scene, camera);
    }

    // Start de boel
    init();
</script>
</body>
</html>
