<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>3D Car Display - Realistische Studio</title>
    <style>
        body { margin: 0; background: #ffffff; overflow: hidden; font-family: sans-serif; transition: background 0.4s ease; }
        canvas { display: block; }
        #loader { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 20px; color: #666; font-weight: bold; }
    </style>
</head>
<body>

<div id="loader">Jouw eigen sportwagen wordt ingeladen...</div>

<script type="module">
    // Firebase imports
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";

    // Firebase configuratie
    const firebaseConfig = {
        apiKey: "AIzaSyCanbhxTJjMLhy4iZLhklCxyFCHKGF4ZAw",
        authDomain: "car-configurator-616c9.firebaseapp.com",
        databaseURL: "https://car-configurator-616c9-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "car-configurator-616c9",
        storageBucket: "car-configurator-616c9.firebasestorage.app",
        messagingSenderId: "1065746669569",
        appId: "1:1065746669569:web:fbd1fbc36839f4a091e000"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Three.js variabelen
    let scene, camera, renderer, autoModel, lakMateriaal, vloerMesh;
    let ambientLight, directionalLights = [];
    let isUserInteracting = false;
    let autoRotateTimeout;
    let isNachtModus = false;

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff); 
        
        camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(4.3, 1.1, 5.8); 
        camera.lookAt(0, -0.3, 0);

        renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.6; 
        document.body.appendChild(renderer.domElement);

        ambientLight = new THREE.AmbientLight(0xffffff, 1.2); 
        scene.add(ambientLight); 

        const lichtenPosities = [[0, 10, 0, 1.5], [5, 4, 4, 1.5], [-5, 4, 4, 1.5], [0, 3, -6, 1.0]];
        lichtenPosities.forEach(pos => {
            let light = new THREE.DirectionalLight(0xffffff, pos[3]);
            light.position.set(pos[0], pos[1], pos[2]);
            if(pos[0] === 0 && pos[1] === 10) {
                light.castShadow = true;
                light.shadow.mapSize.width = 2048;
                light.shadow.mapSize.height = 2048;
                light.shadow.bias = -0.0001;
            }
            scene.add(light);
            directionalLights.push(light);
        });

        const vloerGeo = new THREE.PlaneGeometry(100, 100);
        const vloerMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.4, metalness: 0.0 });
        vloerMesh = new THREE.Mesh(vloerGeo, vloerMat);
        vloerMesh.rotation.x = -Math.PI / 2;
        vloerMesh.receiveShadow = true;
        vloerMesh.position.y = -1.2;
        scene.add(vloerMesh);

        lakMateriaal = new THREE.MeshStandardMaterial({
            color: 0x0044ff,
            metalness: 0.85,
            roughness: 0.1,
            clearcoat: 1.0,
            clearcoatRoughness: 0.02
        });

        const loader = new THREE.GLTFLoader();
        loader.load('mijnauto.glb', function (gltf) {
            autoModel = gltf.scene;
            autoModel.traverse((node) => {
                if (node.isMesh) {
                    node.castShadow = true;
                    node.receiveShadow = true;
                    if (node.material) node.material.envMapIntensity = 2.0;
                    const matName = node.material && node.material.name ? node.material.name.toLowerCase() : '';
                    if (matName.includes('body') || matName.includes('paint') || matName.includes('lak')) {
                        node.material = lakMateriaal;
                    }
                }
            });

            const box = new THREE.Box3().setFromObject(autoModel);
            const center = box.getCenter(new THREE.Vector3());
            const targetScale = 6.6 / Math.max(box.getSize(new THREE.Vector3()).x, box.getSize(new THREE.Vector3()).y, box.getSize(new THREE.Vector3()).z);
            autoModel.scale.set(targetScale, targetScale, targetScale);
            autoModel.position.set(-center.x * targetScale, (-box.min.y * targetScale) - 1.2, -center.z * targetScale);

            scene.add(autoModel);
            document.getElementById('loader').style.display = 'none';
            animate();
        });

        // Firebase luisteraar voor de kleur
        onValue(ref(db, 'auto/kleur'), (snapshot) => {
            const nieuweKleur = snapshot.val();
            if (nieuweKleur) {
                lakMateriaal.color.set(nieuweKleur);
            }
        });
    }

    function animate() {
        requestAnimationFrame(animate);
        if (autoModel && !isUserInteracting) autoModel.rotation.y += 0.002;
        renderer.render(scene, camera);
    }

    init();
</script>
</body>
</html>
