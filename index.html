<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>3D Car Display - Realistische Studio</title>
    <style>
        body { margin: 0; background: #ffffff; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; }
        #loader { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 20px; color: #666; font-weight: bold; }
    </style>
</head>
<body>

<div id="loader">Jouw eigen sportwagen wordt ingeladen...</div>

<script type="module">
    // 1. Stabiele imports via unpkg
    import * as THREE from 'https://unpkg.com/three@0.128.0/build/three.module.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.128.0/examples/jsm/loaders/GLTFLoader.js';
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";

    // Firebase configuratie
    const firebaseConfig = {
        apiKey: "AIzaSyCanbhxTJjMLhy4iZLhklCxyFCHKGF4ZAw",
        authDomain: "car-configurator-616c9.firebaseapp.com",
        databaseURL: "https://car-configurator-616c9-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "car-configurator-616c9",
        storageBucket: "car-configurator-616c9.firebasestorage.app",
        messagingSenderId: "1065746669569",
        appId: "1:1065746669569:web:fbd1fbc36839f4a091e000"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let scene, camera, renderer, autoModel, lakMateriaal;

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff); 
        
        camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(4.3, 1.1, 5.8); 
        camera.lookAt(0, -0.3, 0);

        renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.6; 
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 1.2); 
        scene.add(ambientLight); 

        lakMateriaal = new THREE.MeshStandardMaterial({
            color: 0x0044ff,
            metalness: 0.85,
            roughness: 0.1,
            clearcoat: 1.0,
            clearcoatRoughness: 0.02
        });

        const loader = new GLTFLoader();
        loader.load('./mijnauto.glb', (gltf) => {
            autoModel = gltf.scene;
            autoModel.traverse((node) => {
                if (node.isMesh) {
                    const matName = node.material && node.material.name ? node.material.name.toLowerCase() : '';
                    if (matName.includes('body') || matName.includes('paint') || matName.includes('lak')) {
                        node.material = lakMateriaal;
                    }
                }
            });
            
            const box = new THREE.Box3().setFromObject(autoModel);
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);
            const scale = 6.6 / maxDim;
            autoModel.scale.set(scale, scale, scale);
            
            scene.add(autoModel);
            document.getElementById('loader').style.display = 'none';
            animate();
        }, undefined, (error) => {
            console.error('Fout bij laden model:', error);
            document.getElementById('loader').innerText = "Fout bij laden auto. Check console (F12).";
        });

        onValue(ref(db, 'auto/kleur'), (snapshot) => {
            const kleur = snapshot.val();
            if (kleur) lakMateriaal.color.set(kleur);
        });
    }

    function animate() {
        requestAnimationFrame(animate);
        if (autoModel) autoModel.rotation.y += 0.002;
        renderer.render(scene, camera);
    }

    init();
</script>
</body>
</html>
