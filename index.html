<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>3D Car Configurator</title>
    <style>
        body { margin: 0; background: #ffffff; overflow: hidden; }
        #loader { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-family: sans-serif; font-size: 20px; color: #333; }
    </style>
    
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCanbhxTJjMLhy4iZLhklCxyFCHKGF4ZAw",
            authDomain: "car-configurator-616c9.firebaseapp.com",
            databaseURL: "https://car-configurator-616c9-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "car-configurator-616c9",
            storageBucket: "car-configurator-616c9.firebasestorage.app",
            messagingSenderId: "1065746669569",
            appId: "1:1065746669569:web:fbd1fbc36839f4a091e000"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        window.db = db;
        window.ref = ref;
        window.onValue = onValue;
    </script>
</head>
<body>

<div id="loader">De sportwagen wordt geladen...</div>

<script>
    let scene, camera, renderer, autoModel;

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);
        
        camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.5, 6);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 1. Zeer sterke verlichting voor maximale zichtbaarheid
        scene.add(new THREE.AmbientLight(0xffffff, 2.0)); 
        const dirLight = new THREE.DirectionalLight(0xffffff, 2.0);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);
        
        // Voeg extra licht toe vanuit de camera hoek
        const frontLight = new THREE.DirectionalLight(0xffffff, 1.0);
        camera.add(frontLight);
        scene.add(camera);

        const loader = new THREE.GLTFLoader();
        loader.load('./mijnauto.glb', (gltf) => {
            autoModel = gltf.scene;
            const box = new THREE.Box3().setFromObject(autoModel);
            const center = box.getCenter(new THREE.Vector3());
            autoModel.position.sub(center); 
            
            scene.add(autoModel);
            document.getElementById('loader').style.display = 'none';

            // Kleur update ZONDER filter
            if(window.db) {
                window.onValue(window.ref(window.db, 'auto/kleur'), (snapshot) => {
                    const k = snapshot.val();
                    if(k) {
                        autoModel.traverse(node => {
    if (node.isMesh) {
        // We controleren nu specifiek op de materiaalnaam die je hebt gevonden
        if (node.material.name === "CarPrimaryColor") {
            node.material.color.set(k);
            node.material.metalness = 0.5; // Maakt de lak glanzend
            node.material.roughness = 0.2; // Maakt de lak glad
            node.material.needsUpdate = true;
        }
        // Alles wat NIET "CarPrimaryColor" heet, wordt nu met rust gelaten!
    }
});
            animate();
        });
    }

    function animate() {
        requestAnimationFrame(animate);
        if(autoModel) autoModel.rotation.y += 0.005;
        renderer.render(scene, camera);
    }
    init();
</script>
</body>
</html>
