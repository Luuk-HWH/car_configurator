<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>3D Car Configurator</title>
    <style>
        body { margin: 0; background: #ffffff; overflow: hidden; }
        #loader { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-family: sans-serif; font-size: 20px; color: #333; }
    </style>
    
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCanbhxTJjMLhy4iZLhklCxyFCHKGF4ZAw",
            authDomain: "car-configurator-616c9.firebaseapp.com",
            databaseURL: "https://car-configurator-616c9-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "car-configurator-616c9",
            storageBucket: "car-configurator-616c9.firebasestorage.app",
            messagingSenderId: "1065746669569",
            appId: "1:1065746669569:web:fbd1fbc36839f4a091e000"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        window.db = db;
        window.ref = ref;
        window.onValue = onValue;
    </script>
</head>
<body>

<div id="loader">De sportwagen wordt geladen...</div>

<script>
    let scene, camera, renderer, autoModel;
    let targets = { 
        Door_L: { axis: 'z', val: 0 }, 
        Door_R: { axis: 'z', val: 0 }, 
        Hood_front: { axis: 'x', val: 0 }, 
        Hood_Back: { axis: 'x', val: -0.05 } 
    };

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);
        
        camera = new THREE.PerspectiveCamera(45, 6480 / 3840, 0.1, 1000);
        camera.position.set(0, 1.5, 6);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(6480, 3840);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 2.0)); 
        const dirLight = new THREE.DirectionalLight(0xffffff, 2.0);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        const loader = new THREE.GLTFLoader();
        loader.load('./mijnauto.glb', (gltf) => {
            autoModel = gltf.scene;

            // SCHAAL AANPASSING: Auto 1.5x groter maken
            autoModel.scale.set(1.5, 1.5, 1.5);
            
            const box = new THREE.Box3().setFromObject(autoModel);
            const center = box.getCenter(new THREE.Vector3());
            autoModel.position.sub(center); 

            // HIER kun je de auto handmatig verplaatsen
            // autoModel.position.y is voor de hoogte
            autoModel.position.y += 0.5; 

            // autoModel.position.x is voor de zijkant
            // Positief getal = rechts, Negatief getal = links
            autoModel.position.x -= 0.5;
            
            scene.add(autoModel);
            document.getElementById('loader').style.display = 'none';

            if(window.db) {
                // Kleur listener
                window.onValue(window.ref(window.db, 'auto/kleur'), (snapshot) => {
                    const k = snapshot.val();
                    if(k) {
                        autoModel.traverse(node => {
                            if(node.isMesh && node.material.name === "CarPrimaryColor") {
                                node.material.color.set(k);
                                node.material.metalness = 0.5;
                                node.material.roughness = 0.2;
                                node.material.needsUpdate = true;
                            }
                        });
                    }
                });

                // Deuren/Kappen listener
                window.onValue(window.ref(window.db, 'auto/deuren'), (snapshot) => {
                    const isOpen = snapshot.val();
                    targets.Door_L.val = isOpen ? -0.8 : 0; 
                    targets.Door_R.val = isOpen ? 0.8 : 0;
                    targets.Hood_front.val = isOpen ? -0.8 : 0; 
                    targets.Hood_Back.val = isOpen ? 0.8 : 0.05; 
                });
            }
            animate();
        });
    }

    function animate() {
        requestAnimationFrame(animate);
        if(autoModel) {
            autoModel.rotation.y += 0.003;
            
            autoModel.traverse(node => {
                if (targets.hasOwnProperty(node.name)) {
                    let t = targets[node.name];
                    if (t.axis === 'z') {
                        node.rotation.z += (t.val - node.rotation.z) * 0.1;
                    } else if (t.axis === 'x') {
                        node.rotation.x += (t.val - node.rotation.x) * 0.1;
                    }
                }
            });
        }
        renderer.render(scene, camera);
    }
    init();
</script>
</body>
</html>
