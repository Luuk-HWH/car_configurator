<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>3D Car Configurator</title>
    <style>
        body { 
            margin: 0; 
            background: #ffffff; 
            overflow: hidden; 
        }

        #loader { 
            position: absolute; 
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffffff; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            z-index: 1000; 
            transition: opacity 1s ease;
        }

        .tire-container { 
            position: relative; 
            width: 150px; 
            height: 150px; 
        }

        .tire { 
            width: 150px; 
            height: 150px; 
            background: radial-gradient(circle, #ddd 20%, #333 25%, #333 70%, #000 75%);
            border-radius: 50%;
            border: 10px solid #222;
            /* De animatie staat nu op 2 seconden voor een rustigere rotatie */
            animation: rotate 2s linear infinite, rollOut 1.5s ease-in 4s forwards;
        }

        .tire::after {
            content: '';
            position: absolute;
            top: 10%; left: 10%; width: 80%; height: 80%;
            /* De spaken zijn nu dikker gemaakt (op 12% in plaats van 2%) */
            background: 
                linear-gradient(90deg, transparent 44%, #fff 50%, transparent 56%),
                linear-gradient(18deg, transparent 44%, #fff 50%, transparent 56%),
                linear-gradient(54deg, transparent 44%, #fff 50%, transparent 56%),
                linear-gradient(90deg, transparent 44%, #fff 50%, transparent 56%),
                linear-gradient(126deg, transparent 44%, #fff 50%, transparent 56%),
                linear-gradient(162deg, transparent 44%, #fff 50%, transparent 56%);
            border-radius: 50%;
        }

        .smoke { 
            position: absolute; 
            bottom: -20px; 
            left: -50px; 
            width: 100px; 
            height: 30px;
            background: #ccc; 
            border-radius: 50%; 
            opacity: 0; 
            animation: fadeSmoke 1s linear 4s forwards;
        }

        @keyframes rotate { 
            from { transform: rotate(0deg); } 
            to { transform: rotate(360deg); } 
        }

        @keyframes rollOut { 
            to { transform: translateX(300vw) rotate(720deg); } 
        }

        @keyframes fadeSmoke { 
            0% { opacity: 0.5; } 
            100% { opacity: 0; transform: translateX(100px); } 
        }

        canvas { 
            display: block; 
            width: 100vw; 
            height: 100vh; 
            opacity: 0; 
            transition: opacity 1s ease;
        }
    </style>

    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCanbhxTJjMLhy4iZLhklCxyFCHKGF4ZAw",
            authDomain: "car-configurator-616c9.firebaseapp.com",
            databaseURL: "https://car-configurator-616c9-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "car-configurator-616c9",
            storageBucket: "car-configurator-616c9.firebasestorage.app",
            messagingSenderId: "1065746669569",
            appId: "1:1065746669569:web:fbd1fbc36839f4a091e000"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        window.db = db;
        window.ref = ref;
        window.onValue = onValue;

        init();
    </script>
</head>
<body>

<div id="loader">
    <div class="tire-container">
        <div class="tire"></div>
        <div class="smoke"></div>
    </div>
</div>

<script>
    let scene, camera, renderer, autoModel;
    let targets = { 
        Door_L: { axis: 'z', val: 0 }, 
        Door_R: { axis: 'z', val: 0 }, 
        Hood_front: { axis: 'x', val: 0 }, 
        Hood_Back: { axis: 'x', val: 1 } 
    };

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);
        
        camera = new THREE.PerspectiveCamera(45, 6480 / 3840, 0.1, 1000);
        camera.position.set(0, 3.5, 8);
        camera.lookAt(0, 0, 0);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(6480, 3840);
        // Verbeterde belichtingsinstellingen
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 2.0; 
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);
        renderer.domElement.style.opacity = '0';

        const pmremGenerator = new THREE.PMREMGenerator(renderer);
        // Gebruik een wittere achtergrond voor de reflectie-omgeving
        const envScene = new THREE.Scene();
        const hemi = new THREE.HemisphereLight(0xffffff, 0xffffff, 2);
        envScene.add(hemi);
        scene.environment = pmremGenerator.fromScene(envScene, 0.04).texture;

        scene.add(new THREE.AmbientLight(0xffffff, 1.2)); 
        scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.0));

        const dirLight = new THREE.DirectionalLight(0xffffff, 2.5);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 10;
        dirLight.shadow.camera.bottom = -10;
        dirLight.shadow.camera.left = -10;
        dirLight.shadow.camera.right = 10;
        scene.add(dirLight);

        const plane = new THREE.Mesh(
            new THREE.PlaneGeometry(20, 20), 
            new THREE.ShadowMaterial({ opacity: 0.3 })
        );
        plane.rotation.x = -Math.PI / 2;
        plane.position.y = 0.6; 
        plane.receiveShadow = true;
        scene.add(plane);

        window.onValue(window.ref(window.db, 'auto/model'), (snapshot) => {
            const modelUrl = snapshot.val() || './mijnauto.glb';
            const loader = new THREE.GLTFLoader();
            
            loader.load(modelUrl, (gltf) => {
                if(autoModel) scene.remove(autoModel);
                autoModel = gltf.scene;

                autoModel.traverse(n => { 
                    if (n.isMesh) { 
                        n.castShadow = true; 
                        n.material.envMapIntensity = 5.0; // Hogere reflectiekracht
                        n.material.metalness = 0.9; 
                        n.material.roughness = 0.05; 
                    } 
                });
                
                // Schaal aangepast naar 0.8
                autoModel.scale.set(0.8, 0.8, 0.8);
                const box = new THREE.Box3().setFromObject(autoModel);
                const center = box.getCenter(new THREE.Vector3());
                autoModel.position.sub(center);
                
                autoModel.position.y = 0.7; 
                autoModel.position.x -= 2.2;
                
                scene.add(autoModel);

                // Sequencer: eerst wegrollen, dan fade-in
                setTimeout(() => {
                    document.getElementById('loader').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('loader').style.display = 'none';
                        renderer.domElement.style.opacity = '1';
                    }, 1000);
                }, 1000);
            });
        });

        if(window.db) {
            window.onValue(window.ref(window.db, 'auto/kleur'), (snapshot) => {
                const k = snapshot.val();
                if(k && autoModel) {
                    autoModel.traverse(n => { 
                        if(n.isMesh && n.material.name === "CarPrimaryColor") {
                            n.material.color.set(k); 
                        } 
                    });
                }
            });

            window.onValue(window.ref(window.db, 'auto/deuren'), (snapshot) => {
                const isOpen = snapshot.val();
                targets.Door_L.val = isOpen ? -0.8 : 0; 
                targets.Door_R.val = isOpen ? 0.8 : 0;
                targets.Hood_front.val = isOpen ? -0.8 : 0; 
                targets.Hood_Back.val = isOpen ? -0.8 : 1; 
            });

            window.onValue(window.ref(window.db, 'auto/lichten'), (snapshot) => {
                const isAan = snapshot.val();
                if(autoModel) {
                    autoModel.traverse(n => {
                        if (n.name === "Light" || n.name === "light_red") {
                            n.material.emissive.set(n.name === "Light" ? 0xfff4d6 : 0xff0000);
                            n.material.emissiveIntensity = isAan ? 5 : 0;
                        }
                    });
                }
            });

            window.onValue(window.ref(window.db, 'auto/kenteken'), (snapshot) => {
                const tekst = snapshot.val() || "AUTO";
                const canvas = document.createElement("canvas");
                canvas.width = 512; canvas.height = 128;
                const ctx = canvas.getContext("2d");
                ctx.fillStyle = "white"; ctx.fillRect(0,0,512,128);
                ctx.fillStyle = "black"; ctx.font = "Bold 80px Arial";
                ctx.textAlign = "center"; ctx.fillText(tekst, 256, 90);
                const texture = new THREE.CanvasTexture(canvas);
                if(autoModel) autoModel.traverse(n => { if(n.name === "LicensePlate") n.material.map = texture; });
            });
        }
        animate();
    }

    function animate() {
        requestAnimationFrame(animate);
        if(autoModel) {
            autoModel.rotation.y += 0.003;
            autoModel.traverse(node => {
                if (targets.hasOwnProperty(node.name)) {
                    let t = targets[node.name];
                    if (t.axis === 'z') {
                        node.rotation.z += (t.val - node.rotation.z) * 0.1;
                    } else if (t.axis === 'x') {
                        node.rotation.x += (t.val - node.rotation.x) * 0.1;
                    }
                }
            });
        }
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
