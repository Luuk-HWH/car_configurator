<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>3D Car Configurator</title>
    <style>
        body { margin: 0; background: #ffffff; overflow: hidden; }
        #loader { position: absolute; inset: 0; background: #ffffff; display: flex; align-items: center; justify-content: center; z-index: 1000; transition: opacity 1s ease; }
        .tire-container { position: relative; width: 150px; height: 150px; }
        .tire { width: 150px; height: 150px; background: radial-gradient(circle, #ddd 20%, #333 25%, #333 70%, #000 75%); border-radius: 50%; border: 10px solid #222; animation: rotate 2s linear infinite, rollOut 1.5s ease-in 4s forwards; }
        .tire::after { content: ''; position: absolute; top: 10%; left: 10%; width: 80%; height: 80%; background: linear-gradient(90deg, transparent 44%, #fff 50%, transparent 56%), linear-gradient(18deg, transparent 44%, #fff 50%, transparent 56%), linear-gradient(54deg, transparent 44%, #fff 50%, transparent 56%), linear-gradient(126deg, transparent 44%, #fff 50%, transparent 56%), linear-gradient(162deg, transparent 44%, #fff 50%, transparent 56%); border-radius: 50%; }
        .smoke { position: absolute; bottom: -20px; left: -50px; width: 100px; height: 30px; background: #ccc; border-radius: 50%; opacity: 0; animation: fadeSmoke 1s linear 4s forwards; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes rollOut { to { transform: translateX(300vw) rotate(720deg); } }
        @keyframes fadeSmoke { 0% { opacity: 0.5; } 100% { opacity: 0; transform: translateX(100px); } }
        canvas { display: block; width: 100vw; height: 100vh; }

        #admin-tab {
            position: fixed;
            top: 18px;
            right: 18px;
            z-index: 900;
            background: #f4f4f4;
            color: #111;
            border: 0;
            border-radius: 10px;
            padding: 12px 18px;
            font: 700 14px sans-serif;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.16);
        }

        #admin-panel {
            position: fixed;
            top: 70px;
            right: 18px;
            z-index: 901;
            width: 280px;
            background: #ffffff;
            border-radius: 10px;
            box-shadow: 0 10px 28px rgba(0,0,0,0.22);
            padding: 16px;
            font-family: sans-serif;
            display: none;
        }

        #admin-panel.open { display: block; }
        #admin-panel h3 { margin: 0 0 12px; font-size: 18px; }
        #admin-panel input[type="password"] { width: 100%; box-sizing: border-box; padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 8px; }
        #admin-panel button { cursor: pointer; border: 0; border-radius: 8px; padding: 10px 12px; background: #333; color: white; font-weight: 700; }
        .admin-row { display: grid; grid-template-columns: 72px 1fr 44px; gap: 8px; align-items: center; margin: 10px 0; font-size: 13px; }
        .admin-row input { width: 100%; }
        .admin-actions { display: flex; gap: 8px; margin-top: 14px; }
        .hidden { display: none; }
    </style>

    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCanbhxTJjMLhy4iZLhklCxyFCHKGF4ZAw",
            authDomain: "car-configurator-616c9.firebaseapp.com",
            databaseURL: "https://car-configurator-616c9-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "car-configurator-616c9",
            storageBucket: "car-configurator-616c9.firebasestorage.app",
            messagingSenderId: "1065746669569",
            appId: "1:1065746669569:web:fbd1fbc36839f4a091e000"
        };

        const app = initializeApp(firebaseConfig);
        window.db = getDatabase(app);
        window.ref = ref;
        window.onValue = onValue;

        window.addEventListener('DOMContentLoaded', init);
    </script>
</head>
<body>

<div id="loader">
    <div class="tire-container">
        <div class="tire"></div>
        <div class="smoke"></div>
    </div>
</div>

<button id="admin-tab" type="button">Camera</button>
<div id="admin-panel">
    <div id="admin-login">
        <h3>Camera setup</h3>
        <input id="admin-password" type="password" placeholder="Password">
        <button id="admin-unlock" type="button">Unlock</button>
    </div>

    <div id="admin-controls" class="hidden">
        <h3>Camera setup</h3>
        <div id="camera-controls"></div>
        <div class="admin-actions">
            <button id="admin-save" type="button">Save</button>
            <button id="admin-reset" type="button">Reset</button>
            <button id="admin-close" type="button">Close</button>
        </div>
    </div>
</div>

<script>
    let scene, camera, renderer, autoModel, currentModelRoot;
    let rotationInput = 0;
    let autoRotate = true;
    let rotationTimeout;
    let currentColor = '#6E2E2E';

    const ADMIN_PASSWORD = '1234';
    const CAMERA_STORAGE_KEY = 'car_configurator_camera_settings';

    let hasSavedCameraSettings = false;
    let cameraSettings = getResponsiveCameraSettings();

    const targets = {
        Door_L: { axis: 'z', val: 0 },
        Door_R: { axis: 'z', val: 0 },
        Hood_front: { axis: 'x', val: 0 },
        Hood_Back: { axis: 'x', val: -4 }
    };

    function getResponsiveCameraSettings() {
        const aspect = window.innerWidth / window.innerHeight;

        if (aspect > 1.7) {
            return { x: 0, y: 2.05, z: 5.7, lookY: 0.05, fov: 39, modelScale: 1.38, modelY: -0.72 };
        }

        if (aspect < 1) {
            return { x: 0, y: 2.45, z: 7.0, lookY: 0.25, fov: 48, modelScale: 1.18, modelY: -0.48 };
        }

        return { x: 0, y: 2.25, z: 6.1, lookY: 0.2, fov: 42, modelScale: 1.32, modelY: -0.65 };
    }

    function loadCameraSettings() {
        const saved = localStorage.getItem(CAMERA_STORAGE_KEY);

        if (!saved) {
            cameraSettings = getResponsiveCameraSettings();
            hasSavedCameraSettings = false;
            return;
        }

        try {
            cameraSettings = { ...getResponsiveCameraSettings(), ...JSON.parse(saved) };
            hasSavedCameraSettings = true;
        } catch {
            cameraSettings = getResponsiveCameraSettings();
            hasSavedCameraSettings = false;
        }
    }

    function saveCameraSettings() {
        localStorage.setItem(CAMERA_STORAGE_KEY, JSON.stringify(cameraSettings));
        hasSavedCameraSettings = true;
    }

    function resetCameraSettings() {
        localStorage.removeItem(CAMERA_STORAGE_KEY);
        hasSavedCameraSettings = false;
        cameraSettings = getResponsiveCameraSettings();
        applyCameraSettings();
        applyModelSettings();
        updateAdminControlValues();
    }

    function applyCameraSettings() {
        if (!camera) return;

        camera.fov = Number(cameraSettings.fov);
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.position.set(
            Number(cameraSettings.x),
            Number(cameraSettings.y),
            Number(cameraSettings.z)
        );
        camera.lookAt(0, Number(cameraSettings.lookY), 0);
        camera.updateProjectionMatrix();
    }

    function applyModelSettings() {
        if (currentModelRoot) {
            const scale = Number(cameraSettings.modelScale);
            currentModelRoot.scale.set(scale, scale, scale);
        }

        if (autoModel) {
            autoModel.position.y = Number(cameraSettings.modelY);
        }
    }

    function init() {
        loadCameraSettings();

        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);

        camera = new THREE.PerspectiveCamera(cameraSettings.fov, window.innerWidth / window.innerHeight, 0.1, 1000);
        applyCameraSettings();

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.outputEncoding = THREE.sRGBEncoding;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.15;
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.1));

        const keyLight = new THREE.DirectionalLight(0xffffff, 1.4);
        keyLight.position.set(5, 8, 6);
        keyLight.castShadow = true;
        keyLight.shadow.mapSize.width = 2048;
        keyLight.shadow.mapSize.height = 2048;
        keyLight.shadow.camera.near = 0.5;
        keyLight.shadow.camera.far = 50;
        keyLight.shadow.bias = -0.0001;
        scene.add(keyLight);

        const fillLight = new THREE.DirectionalLight(0xffffff, 1.4);
        fillLight.position.set(-5, 4, -4);
        scene.add(fillLight);

        const frontLight = new THREE.DirectionalLight(0xffffff, 1.0);
        frontLight.position.set(0, 3, 8);
        scene.add(frontLight);

        const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(200, 200),
    new THREE.ShadowMaterial({ opacity: 0.25 })
);

ground.rotation.x = -Math.PI / 2;
ground.position.y = -1;
ground.receiveShadow = true;
scene.add(ground);

        window.addEventListener('resize', onWindowResize);

        setupFirebaseListeners();
        setupAdminPanel();
        animate();
    }

    function setupFirebaseListeners() {
        window.onValue(window.ref(window.db, 'auto/model'), (snapshot) => {
            const modelUrl = snapshot.val() || './mijnauto.glb';
            loadCarModel(modelUrl);
        });

        window.onValue(window.ref(window.db, 'auto/kleur'), (snapshot) => {
            const color = snapshot.val();
            if (color) applyCarColor(color);
        });

        ['Door_L', 'Door_R', 'Hood_front', 'Hood_Back'].forEach(part => {
            window.onValue(window.ref(window.db, 'auto/deuren/' + part), (snapshot) => {
                const isOpen = !!snapshot.val();

                if (part === 'Door_L') targets.Door_L.val = isOpen ? -0.8 : 0;
                if (part === 'Door_R') targets.Door_R.val = isOpen ? 0.8 : 0;
                if (part === 'Hood_front') targets.Hood_front.val = isOpen ? -0.8 : 0;
                if (part === 'Hood_Back') targets.Hood_Back.val = isOpen ? -0.8 : 1;
            });
        });

        window.onValue(window.ref(window.db, 'auto/rotatie_input'), (snapshot) => {
            rotationInput = Number(snapshot.val()) || 0;
            autoRotate = false;

            clearTimeout(rotationTimeout);
            rotationTimeout = setTimeout(() => {
                autoRotate = true;
                rotationInput = 0;
            }, 2000);
        });
    }

    function loadCarModel(modelUrl) {
        showLoader();

        new THREE.GLTFLoader().load(
            modelUrl,
            (gltf) => {
                if (autoModel) {
                    scene.remove(autoModel);
                }

                currentModelRoot = gltf.scene;
                currentModelRoot.scale.set(cameraSettings.modelScale, cameraSettings.modelScale, cameraSettings.modelScale);
                currentModelRoot.traverse((node) => {
    if (node.isMesh) {
        node.castShadow = true;
        node.receiveShadow = true;
    }
});

                if (modelUrl.toLowerCase().includes('bugatti')) {
                    currentModelRoot.updateMatrixWorld(true);

                    const box = new THREE.Box3().setFromObject(currentModelRoot);
                    const center = new THREE.Vector3();
                    box.getCenter(center);

                    currentModelRoot.position.x -= center.x;
                    currentModelRoot.position.z -= center.z;

                    autoModel = new THREE.Group();
                    autoModel.position.set(0, cameraSettings.modelY, 0);
                    autoModel.add(currentModelRoot);
                } else {
                    autoModel = currentModelRoot;
                    autoModel.position.set(0, cameraSettings.modelY, 0);
                }

                scene.add(autoModel);
                applyCarColor(currentColor);
                hideLoader();
            },
            undefined,
            (error) => {
                console.error('Model kon niet geladen worden:', modelUrl, error);
                hideLoader();
            }
        );
    }

    function applyCarColor(color) {
        currentColor = color || currentColor;

        if (!autoModel) return;

        autoModel.traverse(node => {
            if (!node.isMesh || !node.material) return;

            const materials = Array.isArray(node.material) ? node.material : [node.material];
            let changedMaterial = false;

            const updatedMaterials = materials.map(material => {
                const materialName = (material.name || '').toLowerCase();

                if (materialName !== 'carprimarycolor') {
                    return material;
                }

                changedMaterial = true;

                const clonedMaterial = material.clone();

                if (clonedMaterial.color) {
                    clonedMaterial.color.set(currentColor);
                    clonedMaterial.color.multiplyScalar(0.65);
                }

                if ('metalness' in clonedMaterial) clonedMaterial.metalness = 0.25;
                if ('roughness' in clonedMaterial) clonedMaterial.roughness = 0.35;

                clonedMaterial.needsUpdate = true;
                return clonedMaterial;
            });

            if (!changedMaterial) return;

            node.material = Array.isArray(node.material)
                ? updatedMaterials
                : updatedMaterials[0];
        });
    }

    function setupAdminPanel() {
        const panel = document.getElementById('admin-panel');
        const login = document.getElementById('admin-login');
        const controls = document.getElementById('admin-controls');
        const passwordInput = document.getElementById('admin-password');

        document.getElementById('admin-tab').addEventListener('click', () => {
            panel.classList.toggle('open');
        });

        document.getElementById('admin-unlock').addEventListener('click', () => {
            if (passwordInput.value !== ADMIN_PASSWORD) {
                passwordInput.value = '';
                passwordInput.placeholder = 'Wrong password';
                return;
            }

            login.classList.add('hidden');
            controls.classList.remove('hidden');
            buildAdminControls();
        });

        document.getElementById('admin-save').addEventListener('click', saveCameraSettings);
        document.getElementById('admin-reset').addEventListener('click', resetCameraSettings);
        document.getElementById('admin-close').addEventListener('click', () => panel.classList.remove('open'));
    }

    function buildAdminControls() {
        const container = document.getElementById('camera-controls');
        container.innerHTML = '';

        [
            { key: 'x', label: 'Cam X', min: -3, max: 3, step: 0.05 },
            { key: 'y', label: 'Cam Y', min: 0.5, max: 5, step: 0.05 },
            { key: 'z', label: 'Cam Z', min: 3, max: 10, step: 0.05 },
            { key: 'lookY', label: 'Look Y', min: -1.5, max: 2, step: 0.05 },
            { key: 'fov', label: 'FOV', min: 30, max: 60, step: 1 },
            { key: 'modelScale', label: 'Scale', min: 0.8, max: 1.8, step: 0.01 },
            { key: 'modelY', label: 'Car Y', min: -1.4, max: 0.6, step: 0.02 }
        ].forEach(control => {
            const row = document.createElement('div');
            row.className = 'admin-row';

            const label = document.createElement('label');
            label.innerText = control.label;

            const input = document.createElement('input');
            input.type = 'range';
            input.min = control.min;
            input.max = control.max;
            input.step = control.step;
            input.value = cameraSettings[control.key];
            input.dataset.key = control.key;

            const value = document.createElement('span');
            value.dataset.valueFor = control.key;
            value.innerText = Number(cameraSettings[control.key]).toFixed(2);

            input.addEventListener('input', () => {
                cameraSettings[control.key] = Number(input.value);
                value.innerText = Number(input.value).toFixed(2);
                applyCameraSettings();
                applyModelSettings();
            });

            row.appendChild(label);
            row.appendChild(input);
            row.appendChild(value);
            container.appendChild(row);
        });
    }

    function updateAdminControlValues() {
        document.querySelectorAll('#camera-controls input').forEach(input => {
            const key = input.dataset.key;
            input.value = cameraSettings[key];

            const value = document.querySelector(`[data-value-for="${key}"]`);
            if (value) value.innerText = Number(cameraSettings[key]).toFixed(2);
        });
    }

    function showLoader() {
        const loader = document.getElementById('loader');
        loader.style.display = 'flex';
        loader.style.opacity = '1';
    }

    function hideLoader() {
        const loader = document.getElementById('loader');
        loader.style.opacity = '0';

        setTimeout(() => {
            loader.style.display = 'none';
        }, 1000);
    }

    function onWindowResize() {
        if (!hasSavedCameraSettings) {
            cameraSettings = getResponsiveCameraSettings();
            applyModelSettings();
        }

        applyCameraSettings();
        renderer.setSize(window.innerWidth, window.innerHeight);
        updateAdminControlValues();
    }

    function animate() {
        requestAnimationFrame(animate);

        if (autoModel) {
            if (autoRotate) {
                autoModel.rotation.y += 0.003;
            } else {
                autoModel.rotation.y += rotationInput;
            }

            autoModel.traverse(node => {
                const target = targets[node.name];
                if (!target) return;

                if (target.axis === 'z') {
                    node.rotation.z += (target.val - node.rotation.z) * 0.1;
                }

                if (target.axis === 'x') {
                    node.rotation.x += (target.val - node.rotation.x) * 0.1;
                }
            });
        }

        renderer.render(scene, camera);
    }
</script>
</body>
</html>
