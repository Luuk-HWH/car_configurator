<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>3D Car Configurator</title>
    <style>
        body { 
            margin: 0; 
            background: #ffffff; 
            overflow: hidden; 
        }
        #loader { 
            position: absolute; 
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: sans-serif; 
            text-align: center;
            z-index: 1000;
        }
        .car-outline {
            width: 400px;
            fill: none;
            stroke: #000000;
            stroke-width: 2;
            stroke-dasharray: 600;
            stroke-dashoffset: 600;
            animation: draw 5s linear forwards;
        }
        @keyframes draw { to { stroke-dashoffset: 0; } }
        canvas { 
            display: block; 
            width: 100vw; 
            height: 100vh; 
        }
    </style>

    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCanbhxTJjMLhy4iZLhklCxyFCHKGF4ZAw",
            authDomain: "car-configurator-616c9.firebaseapp.com",
            databaseURL: "https://car-configurator-616c9-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "car-configurator-616c9",
            storageBucket: "car-configurator-616c9.firebasestorage.app",
            messagingSenderId: "1065746669569",
            appId: "1:1065746669569:web:fbd1fbc36839f4a091e000"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        window.db = db;
        window.ref = ref;
        window.onValue = onValue;
    </script>
</head>
<body>

<div id="loader">
    <svg class="car-outline" viewBox="0 0 200 60">
        <path d="M10,40 L30,40 A10,10 0 0,1 50,40 L150,40 A10,10 0 0,1 170,40 L190,40 L180,20 L140,20 L120,10 L80,10 L60,20 L20,20 Z" />
    </svg>
    <div>De sportwagen wordt geladen...</div>
</div>

<script>
    let scene, camera, renderer, autoModel;
    let targets = { 
        Door_L: { axis: 'z', val: 0 }, 
        Door_R: { axis: 'z', val: 0 }, 
        Hood_front: { axis: 'x', val: 0 }, 
        Hood_Back: { axis: 'x', val: 1 } 
    };

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);
        
        camera = new THREE.PerspectiveCamera(45, 6480 / 3840, 0.1, 1000);
        camera.position.set(0, 3.5, 8);
        camera.lookAt(0, 0, 0);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(6480, 3840);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const pmremGenerator = new THREE.PMREMGenerator(renderer);
        scene.environment = pmremGenerator.fromScene(new THREE.Scene(), 0.04).texture;

        scene.add(new THREE.AmbientLight(0xffffff, 0.6)); 
        scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 0.8));

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 10;
        dirLight.shadow.camera.bottom = -10;
        dirLight.shadow.camera.left = -10;
        dirLight.shadow.camera.right = 10;
        scene.add(dirLight);

        const plane = new THREE.Mesh(
            new THREE.PlaneGeometry(20, 20), 
            new THREE.ShadowMaterial({ opacity: 0.3 })
        );
        plane.rotation.x = -Math.PI / 2;
        plane.position.y = 0.6; 
        plane.receiveShadow = true;
        scene.add(plane);

        const loader = new THREE.GLTFLoader();
        const loadPromise = new Promise((resolve) => {
            loader.load('./mijnauto.glb', resolve);
        });

        const timerPromise = new Promise((resolve) => setTimeout(resolve, 5000));

        Promise.all([loadPromise, timerPromise]).then(([gltf]) => {
            autoModel = gltf.scene;

            autoModel.traverse(n => { 
                if (n.isMesh) { 
                    n.castShadow = true; 
                    n.material.envMapIntensity = 2.5; 
                    n.material.metalness = 0.7; 
                    n.material.roughness = 0.1; 
                } 
            });
            
            autoModel.scale.set(1.1, 1.1, 1.1);
            const box = new THREE.Box3().setFromObject(autoModel);
            const center = box.getCenter(new THREE.Vector3());
            autoModel.position.sub(center);
            
            autoModel.position.y = 0.7; 
            autoModel.position.x -= 2.2;
            
            scene.add(autoModel);
            document.getElementById('loader').style.display = 'none';

            if(window.db) {
                window.onValue(window.ref(window.db, 'auto/kleur'), (snapshot) => {
                    const k = snapshot.val();
                    if(k) {
                        autoModel.traverse(n => { 
                            if(n.isMesh && n.material.name === "CarPrimaryColor") {
                                n.material.color.set(k); 
                            } 
                        });
                    }
                });

                window.onValue(window.ref(window.db, 'auto/deuren'), (snapshot) => {
                    const isOpen = snapshot.val();
                    targets.Door_L.val = isOpen ? -0.8 : 0; 
                    targets.Door_R.val = isOpen ? 0.8 : 0;
                    targets.Hood_front.val = isOpen ? -0.8 : 0; 
                    targets.Hood_Back.val = isOpen ? -0.8 : 1; 
                });

                window.onValue(window.ref(window.db, 'auto/lichten'), (snapshot) => {
                    const isAan = snapshot.val();
                    autoModel.traverse(n => {
                        if (n.name === "Light" || n.name === "light_red") {
                            n.material.emissive.set(n.name === "Light" ? 0xfff4d6 : 0xff0000);
                            n.material.emissiveIntensity = isAan ? 5 : 0;
                        }
                    });
                });

                window.onValue(window.ref(window.db, 'auto/kenteken'), (snapshot) => {
                    const tekst = snapshot.val() || "AUTO";
                    const canvas = document.createElement("canvas");
                    canvas.width = 512; canvas.height = 128;
                    const ctx = canvas.getContext("2d");
                    ctx.fillStyle = "white"; ctx.fillRect(0,0,512,128);
                    ctx.fillStyle = "black"; ctx.font = "Bold 80px Arial";
                    ctx.textAlign = "center"; ctx.fillText(tekst, 256, 90);
                    const texture = new THREE.CanvasTexture(canvas);
                    autoModel.traverse(n => { if(n.name === "LicensePlate") n.material.map = texture; });
                });
            }
            animate();
        });
    }

    function animate() {
        requestAnimationFrame(animate);
        if(autoModel) {
            autoModel.rotation.y += 0.003;
            autoModel.traverse(node => {
                if (targets.hasOwnProperty(node.name)) {
                    let t = targets[node.name];
                    if (t.axis === 'z') {
                        node.rotation.z += (t.val - node.rotation.z) * 0.1;
                    } else if (t.axis === 'x') {
                        node.rotation.x += (t.val - node.rotation.x) * 0.1;
                    }
                }
            });
        }
        renderer.render(scene, camera);
    }
    
    init();
</script>
</body>
</html>
