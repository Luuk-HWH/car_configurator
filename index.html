<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Configurator Touchscreen</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            text-align: center; 
            background: #f5f5f7; 
            margin: 0; 
            overflow: hidden; 
            height: 100vh; 
            display: flex; 
            flex-direction: column;
            user-select: none; 
            -webkit-user-select: none;
        }
        .header { padding: 15px; background: white; border-bottom: 1px solid #e5e5e7; }
        #touch-area { 
            flex-grow: 1; 
            background: #fff; 
            margin: 20px; 
            border: 2px dashed #d2d2d7; 
            border-radius: 20px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            color: #86868b; 
            touch-action: none; 
            cursor: grab;
            font-weight: 500;
            font-size: 16px;
        }
        #touch-area:active { cursor: grabbing; background: #fafafa; }
        
        .section-title { font-size: 13px; color: #86868b; text-transform: uppercase; letter-spacing: 1px; margin: 15px 0 8px 0; font-weight: 600;}
        .controls-container { background: white; padding: 20px; border-top: 1px solid #e5e5e7; border-radius: 24px 24px 0 0; box-shadow: 0 -4px 20px rgba(0,0,0,0.05); }
        
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 15px; }
        .grid-action { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 12px; }
        
        button { padding: 16px 5px; border-radius: 12px; border: 1px solid #d2d2d7; font-weight: bold; cursor: pointer; font-size: 15px; transition: all 0.2s ease; }
        button:active { transform: scale(0.96); }
        
        .rood { background: #ff0000; color: white; border: none; box-shadow: 0 4px 10px rgba(255,0,0,0.2); }
        .blauw { background: #0044ff; color: white; border: none; box-shadow: 0 4px 10px rgba(0,68,255,0.2); }
        .grijs { background: #1c1c1e; color: white; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        
        .zoom-btn { background: #f5f5f7; color: #1d1d1f; font-size: 22px; padding: 0; display: flex; justify-content: center; align-items: center; }
        .action-btn { background: #0071e3; color: white; border: none; font-size: 14px; box-shadow: 0 4px 12px rgba(0,113,227,0.3); }
        .connect-btn { background: #34c759; color: white; font-size: 15px; padding: 12px 24px; border: none; border-radius: 30px; box-shadow: 0 4px 10px rgba(52,199,89,0.2); }
    </style>
</head>
<body>

    <div class="header">
        <button class="connect-btn" onclick="openGrootScherm()">1. Verbind Groot Scherm</button>
    </div>

    <div id="touch-area">Klik en sleep hier om de sportwagen te draaien</div>

    <div class="controls-container">
        <div class="section-title">Kleur Lak</div>
        <div class="grid-3">
            <button class="rood" onclick="stuurBericht('kleur', '#ff0000')">Rood</button>
            <button class="blauw" onclick="stuurBericht('kleur', '#0044ff')">Blauw</button>
            <button class="grijs" onclick="stuurBericht('kleur', '#1c1c1e')">Zwart</button>
        </div>

        <div class="section-title">Interactie & Zoom</div>
        <div class="grid-action">
            <button class="action-btn" onclick="stuurBericht('animatie', 'alles')">Open / Sluit Alles</button>
            <button class="zoom-btn" onclick="stuurBericht('zoom', 0.9)">+</button>
            <button class="zoom-btn" onclick="stuurBericht('zoom', 1.1)">-</button>
        </div>
    </div>

    <script>
        let grootSchermVenster;
        const touchArea = document.getElementById('touch-area');

        function openGrootScherm() {
            grootSchermVenster = window.open('groot-scherm.html', 'GrootScherm', 'width=1200,height=800');
        }

        function stuurBericht(type, waarde) {
            if (grootSchermVenster && !grootSchermVenster.closed) {
                grootSchermVenster.postMessage({ type: type, waarde: waarde }, '*');
            }
        }

        let isDragging = false;
        let lastX = 0;

        function startDrag(clientX) {
            isDragging = true;
            lastX = clientX;
            stuurBericht('start_sleep', true);
        }

        function stopDrag() {
            if (!isDragging) return;
            isDragging = false;
            stuurBericht('stop_sleep', true);
        }

        touchArea.addEventListener('mousedown', (e) => startDrag(e.clientX));
        touchArea.addEventListener('touchstart', (e) => startDrag(e.touches[0].clientX));

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            let deltaX = e.clientX - lastX;
            stuurBericht('draai', deltaX * 0.01);
            lastX = e.clientX;
        });

        window.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            let deltaX = e.touches[0].clientX - lastX;
            stuurBericht('draai', deltaX * 0.01);
            lastX = e.touches[0].clientX;
        });

        window.addEventListener('mouseup', stopDrag);
        window.addEventListener('touchend', stopDrag);
    </script>
</body>
</html>
