<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>3D Car Display</title>
    <style>
        body { margin: 0; background: #ffffff; overflow: hidden; }
        #loader { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-family: sans-serif; font-size: 20px; color: #333; }
    </style>
</head>
<body>

<div id="loader">Laden...</div>

<script type="module">
    // Gebruik de volledige URLs. Er staat nergens meer 'three' als los woord!
    import * as THREE from 'https://unpkg.com/three@0.128.0/build/three.module.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.128.0/examples/jsm/loaders/GLTFLoader.js';
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";

    // Firebase config
    const firebaseConfig = {
        apiKey: "AIzaSyCanbhxTJjMLhy4iZLhklCxyFCHKGF4ZAw",
        authDomain: "car-configurator-616c9.firebaseapp.com",
        databaseURL: "https://car-configurator-616c9-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "car-configurator-616c9",
        storageBucket: "car-configurator-616c9.firebasestorage.app",
        messagingSenderId: "1065746669569",
        appId: "1:1065746669569:web:fbd1fbc36839f4a091e000"
    };

    initializeApp(firebaseConfig);
    const db = getDatabase();

    let scene, camera, renderer, autoModel;

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);
        
        camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(4, 2, 6);
        camera.lookAt(0, 0, 0);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.2));

        const loader = new GLTFLoader();
        // Zorg dat mijnauto.glb echt in de hoofdmap staat!
        loader.load('./mijnauto.glb', (gltf) => {
            autoModel = gltf.scene;
            scene.add(autoModel);
            document.getElementById('loader').style.display = 'none';
            animate();
        }, undefined, (err) => {
            console.error("Fout bij laden:", err);
            document.getElementById('loader').innerText = "Fout bij laden model.";
        });
    }

    function animate() {
        requestAnimationFrame(animate);
        if (autoModel) autoModel.rotation.y += 0.005;
        renderer.render(scene, camera);
    }

    init();
</script>
</body>
</html>
